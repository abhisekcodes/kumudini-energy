<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background Board -->
  <rect width="400" height="300" rx="12" fill="#0b172a" />
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="1" />
    </pattern>
    
    <linearGradient id="trace-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="url(#grid)" rx="12" />
  
  <!-- Circular central processor / controller -->
  <circle cx="200" cy="150" r="45" fill="#1e293b" stroke="url(#gold-grad)" stroke-width="3" />
  <rect x="175" y="125" width="50" height="50" rx="4" fill="#0f172a" stroke="#475569" stroke-width="2" />
  <text x="200" y="154" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">MCU</text>
  
  <!-- Pins of MCU -->
  <path d="M 175 135 L 165 135 M 175 145 L 165 145 M 175 155 L 165 155 M 175 165 L 165 165
           M 225 135 L 235 135 M 225 145 L 235 145 M 225 155 L 235 155 M 225 165 L 235 165
           M 185 125 L 185 115 M 195 125 L 195 115 M 205 125 L 205 115 M 215 125 L 215 115
           M 185 175 L 185 185 M 195 175 L 195 185 M 205 175 L 205 185 M 215 175 L 215 185" 
        stroke="#94a3b8" stroke-width="2" />

  <!-- Circuit Traces -->
  <!-- Left Side Traces -->
  <path d="M 50 80 L 120 80 L 155 125 L 165 125" fill="none" stroke="url(#trace-grad)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 50 150 L 110 150 L 130 135 L 165 135" fill="none" stroke="url(#trace-grad)" stroke-width="2" stroke-linecap="round" />
  <path d="M 50 220 L 120 220 L 155 175 L 165 175" fill="none" stroke="url(#trace-grad)" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Right Side Traces -->
  <path d="M 350 80 L 280 80 L 245 125 L 235 125" fill="none" stroke="url(#trace-grad)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 350 150 L 290 150 L 270 165 L 235 165" fill="none" stroke="url(#trace-grad)" stroke-width="2" stroke-linecap="round" />
  <path d="M 350 220 L 280 220 L 245 175 L 235 175" fill="none" stroke="url(#trace-grad)" stroke-width="2.5" stroke-linecap="round" />

  <!-- Solar/LED Connection Points -->
  <circle cx="50" cy="80" r="6" fill="#10b981" filter="url(#glow)" />
  <circle cx="50" cy="150" r="6" fill="#3b82f6" filter="url(#glow)" />
  <circle cx="50" cy="220" r="6" fill="#10b981" filter="url(#glow)" />
  
  <circle cx="350" cy="80" r="6" fill="#f59e0b" filter="url(#glow)" />
  <circle cx="350" cy="150" r="6" fill="#3b82f6" filter="url(#glow)" />
  <circle cx="350" cy="220" r="6" fill="#f59e0b" filter="url(#glow)" />
  
  <!-- Cap & Resistor Components -->
  <rect x="90" y="72" width="16" height="8" rx="1" fill="#ef4444" />
  <rect x="290" y="72" width="16" height="8" rx="1" fill="#ef4444" />
  
  <rect x="90" y="212" width="16" height="8" rx="1" fill="#3b82f6" />
  <rect x="290" y="212" width="16" height="8" rx="1" fill="#3b82f6" />

  <!-- Decorative Solar Text/Branding -->
  <text x="200" y="60" fill="#94a3b8" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">KUMUDINI ENERGY ELEC</text>
  <text x="200" y="245" fill="#475569" font-family="monospace" font-size="9" text-anchor="middle">REV 2.1 (c) 2026</text>

  <!-- Glowing LED status indicators -->
  <circle cx="160" cy="50" r="4" fill="#10b981" filter="url(#glow)" />
  <circle cx="180" cy="50" r="4" fill="#ef4444" />
  <circle cx="200" cy="50" r="4" fill="#3b82f6" filter="url(#glow)" />
  <circle cx="220" cy="50" r="4" fill="#f59e0b" />
  <circle cx="240" cy="50" r="4" fill="#10b981" filter="url(#glow)" />
</svg>
