<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background Warm Classroom Kitchen Glow -->
  <rect width="400" height="300" rx="12" fill="#1e293b" />
  
  <!-- Stylized Kitchen Brick Wall Grid -->
  <defs>
    <pattern id="bricks" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 40 20 M 20 0 L 20 20 M 40 0 L 40 20" fill="none" stroke="#334155" stroke-width="1.5" />
    </pattern>
    <linearGradient id="fire-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="url(#bricks)" rx="12" opacity="0.3" />
  
  <!-- Warm hearth glow -->
  <ellipse cx="200" cy="220" rx="120" ry="60" fill="url(#fire-glow)" filter="url(#glow)" />
  
  <!-- Institutional Double-Burner Biomass Stove outline -->
  <rect x="70" y="160" width="260" height="100" rx="8" fill="#475569" stroke="#64748b" stroke-width="3" />
  <rect x="80" y="170" width="240" height="80" rx="4" fill="#0f172a" />
  
  <!-- Fire Burner Grates -->
  <circle cx="140" cy="170" r="30" fill="none" stroke="#334155" stroke-width="5" />
  <circle cx="260" cy="170" r="30" fill="none" stroke="#334155" stroke-width="5" />
  
  <!-- Pots / Vessels Cooking Mid-day Meal -->
  <path d="M 95 170 L 185 170 L 175 110 L 105 110 Z" fill="#64748b" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round" />
  <rect x="90" y="105" width="100" height="8" rx="2" fill="#475569" />
  <!-- Handles for Pot 1 -->
  <path d="M 95 130 C 85 130 85 150 95 150" fill="none" stroke="#94a3b8" stroke-width="2.5" />
  <path d="M 185 130 C 195 130 195 150 185 150" fill="none" stroke="#94a3b8" stroke-width="2.5" />
  
  <path d="M 215 170 L 305 170 L 295 110 L 225 110 Z" fill="#64748b" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round" />
  <rect x="210" y="105" width="100" height="8" rx="2" fill="#475569" />
  <!-- Handles for Pot 2 -->
  <path d="M 215 130 C 205 130 205 150 215 150" fill="none" stroke="#94a3b8" stroke-width="2.5" />
  <path d="M 305 130 C 315 130 315 150 305 150" fill="none" stroke="#94a3b8" stroke-width="2.5" />
  
  <!-- Heat waves / Steam -->
  <path d="M 125 95 Q 130 80 125 70 M 140 95 Q 145 80 140 70 M 155 95 Q 160 80 155 70" 
        fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <path d="M 245 95 Q 250 80 245 70 M 260 95 Q 265 80 260 70 M 275 95 Q 280 80 275 70" 
        fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" opacity="0.5" />

  <!-- Twigs entering the stove feed (Biomass) -->
  <path d="M 100 220 L 135 210 M 100 225 L 140 215 M 105 230 L 130 220" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" />
  <path d="M 300 220 L 265 210 M 300 225 L 260 215 M 295 230 L 270 220" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" />
  
  <!-- Fire Glow inside Draft chambers -->
  <circle cx="140" cy="210" r="14" fill="#f59e0b" filter="url(#glow)" />
  <circle cx="140" cy="210" r="6" fill="#fff" />
  
  <circle cx="260" cy="210" r="14" fill="#f59e0b" filter="url(#glow)" />
  <circle cx="260" cy="210" r="6" fill="#fff" />
  
  <!-- Text Badge representing institutional usage -->
  <rect x="130" y="20" width="140" height="22" rx="11" fill="#0f172a" stroke="#10b981" stroke-width="1.5" />
  <text x="200" y="34" fill="#10b981" font-family="'Outfit', sans-serif" font-size="9" font-weight="700" letter-spacing="1" text-anchor="middle">CLEAN SCHOOL MEALS</text>
</svg>
