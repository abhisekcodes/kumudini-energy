<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background Deep Midnight sky representing remote clinic operation -->
  <rect width="400" height="300" rx="12" fill="#0f172a" />
  
  <defs>
    <!-- Stars -->
    <pattern id="stars" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="15" r="1" fill="#94a3b8" opacity="0.8"/>
      <circle cx="60" cy="45" r="0.8" fill="#94a3b8" opacity="0.5"/>
      <circle cx="40" cy="65" r="1.2" fill="#94a3b8" opacity="0.9"/>
    </pattern>
    
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="400" height="300" fill="url(#stars)" rx="12" />
  
  <!-- Stylized Hills/Landscape in Keonjhar -->
  <path d="M -20 300 Q 120 220 250 270 T 420 250 L 420 300 Z" fill="#1e293b" opacity="0.6" />
  <path d="M -20 300 Q 90 260 210 280 T 420 270 L 420 300 Z" fill="#0f172a" />
  
  <!-- Clinic Building -->
  <rect x="80" y="160" width="160" height="110" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3" />
  <rect x="135" y="210" width="50" height="60" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
  <line x1="160" y1="210" x2="160" y2="270" stroke="#94a3b8" stroke-width="2" />
  
  <!-- Windows with bright warm yellow glowing light (powered by solar!) -->
  <rect x="100" y="180" width="25" height="25" rx="3" fill="#fbbf24" filter="url(#glow)" />
  <rect x="100" y="180" width="25" height="25" rx="3" fill="#fef08a" stroke="#d97706" stroke-width="1.5" />
  
  <rect x="195" y="180" width="25" height="25" rx="3" fill="#fbbf24" filter="url(#glow)" />
  <rect x="195" y="180" width="25" height="25" rx="3" fill="#fef08a" stroke="#d97706" stroke-width="1.5" />
  
  <!-- Medical Red Cross Logo on the clinic -->
  <circle cx="160" cy="120" r="22" fill="#fff" stroke="#ef4444" stroke-width="3.5" filter="url(#glow)" />
  <circle cx="160" cy="120" r="22" fill="#fff" stroke="#ef4444" stroke-width="3.5" />
  <path d="M 160 108 L 160 132 M 148 120 L 172 120" stroke="#ef4444" stroke-width="7" stroke-linecap="square" />
  
  <!-- Rooftop Solar Panel array -->
  <path d="M 230 160 L 320 160 L 300 110 L 250 110 Z" fill="url(#panel-grad)" stroke="#cbd5e1" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Panel Grid Lines -->
  <line x1="275" y1="110" x2="275" y2="160" stroke="#e2e8f0" stroke-width="1.5" />
  <line x1="250" y1="110" x2="230" y2="160" stroke="#e2e8f0" stroke-width="1.5" />
  <line x1="300" y1="110" x2="320" y2="160" stroke="#e2e8f0" stroke-width="1.5" />
  <line x1="240" y1="135" x2="310" y2="135" stroke="#e2e8f0" stroke-width="1.5" />
  
  <!-- Mounting Bracket for Solar Panel -->
  <path d="M 275 160 L 275 190 M 265 190 L 285 190" stroke="#64748b" stroke-width="3" />
  
  <!-- Glowing Power connection lines to building -->
  <path d="M 275 190 L 220 190" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" />
  
  <!-- Header Text Badge -->
  <rect x="120" y="20" width="160" height="22" rx="11" fill="#0f172a" stroke="#10b981" stroke-width="1.5" />
  <text x="200" y="34" fill="#10b981" font-family="'Outfit', sans-serif" font-size="9" font-weight="700" letter-spacing="1" text-anchor="middle">24/7 SOLAR HEALTHCARE</text>
</svg>
